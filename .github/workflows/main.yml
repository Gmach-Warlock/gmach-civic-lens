name: Civic Lens CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: civiclens_test
          POSTGRES_USER: ${{ secrets.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
          cache-dependency-path: ./server/package-lock.json
      - run: npm install
      - run: npm test
        env:
          NODE_ENV: test
          # Map these strictly to match your config.js requirements
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: civiclens_test
          DB_HOST: localhost
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  test-client:
    runs-on: ubuntu-latest
    # Define these at the job level so Vite sees them during build/test
    env:
      VITE_ADOBE_URL: ${{ secrets.VITE_ADOBE_URL }}
      VITE_FONT_AWESOME_URL: ${{ secrets.VITE_FONT_AWESOME_URL }}
      VITE_SERVER_URL: http://localhost:4000
      VITE_REGISTER_USER_PATH: /api/auth/register
      VITE_LOGIN_USER_PATH: /api/auth/login
      VITE_VERIFY_TOKEN_PATH: api/auth/me
      VITE_CREATE_ISSUE_PATH: api/issues/
      VITE_GET_ALL_ISSUES_PATH: api/issues/
      VITE_UPVOTE_ISSUE_PATH: api/issues/
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
      - run: npm install
      - run: npm test
