services:
  db:
    image: postgres:18
    container_name: pern_db
    restart: always
    environment:
      POSTGRES_USER: drill_sergeant
      POSTGRES_PASSWORD: priVatePile*1O1
      POSTGRES_DB: civiclens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  server:
    build: ./server
    container_name: pern_server
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /a;;/node_modules
  client:
    build: ./client
    container_name: pern_client
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - "./client:/app"
      - /app/node_modules
  volumes:
    postres_data:
